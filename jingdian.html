<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="雪域安多·藏韵传承 - 景点详情页">
  <title id="page-title">景点详情 - 雪域安多·藏韵传承</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-red: #9B2B25;
      --primary-gold: #D4AF37;
      --secondary-orange: #E8A87C;
      --bg-primary: #FAF9F7;
      --bg-secondary: #FFFFFF;
      --text-primary: #2C3E50;
      --text-secondary: #5D6D7E;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.15);
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans SC', "Microsoft YaHei", sans-serif;
    }

    *:focus { outline: none; }
    *:focus-visible { outline: none; }
    button { outline: none; }
    button:focus { outline: none; }
    a { outline: none; }
    a:focus { outline: none; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--primary-red) 0%, #7a1f1a 100%);
      box-shadow: var(--shadow-md);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }

    .navbar-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary-gold), #E8C84A);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .navbar-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .navbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      transition: var(--transition);
      white-space: nowrap;
    }

    .navbar-back:hover {
      background: rgba(255,255,255,0.15);
      color: white;
      border-color: rgba(255,255,255,0.6);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 30px 20px 80px;
    }

    /* ===== LOADING / ERROR ===== */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      gap: 20px;
    }

    .loading-spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #f0ece6;
      border-top: 4px solid var(--primary-red);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: 16px;
    }

    .error-container {
      text-align: center;
      padding: 80px 20px;
    }

    .error-icon {
      font-size: 56px;
      color: var(--primary-red);
      margin-bottom: 20px;
    }

    .error-message {
      color: var(--text-secondary);
      font-size: 18px;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--primary-red), #B83C2E);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }

    .back-btn:hover {
      background: linear-gradient(135deg, #B83C2E, var(--primary-red));
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ===== HERO BANNER ===== */
    .hero-banner {
      position: relative;
      width: 100%;
      height: 460px;
      overflow: hidden;
      border-radius: var(--radius-md);
      margin-bottom: 28px;
      box-shadow: var(--shadow-lg);
    }

    .hero-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .hero-banner:hover img {
      transform: scale(1.04);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 35%, rgba(0,0,0,0.72) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px 36px 32px;
    }

    .hero-title {
      font-size: 38px;
      font-weight: 700;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .hero-address {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212, 175, 55, 0.9);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      align-self: flex-start;
    }

    /* ===== CONTENT CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .cards-grid.single-col {
      grid-template-columns: 1fr;
    }

    .content-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 30px 28px;
      box-shadow: var(--shadow-sm);
      border-top: 3px solid var(--primary-gold);
      transition: var(--transition);
    }

    .content-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }

    .content-card.full-width {
      grid-column: 1 / -1;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0ece6;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary-red), #B83C2E);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary-red);
    }

    .card-body {
      font-size: 15px;
      line-height: 2;
      color: var(--text-secondary);
      white-space: pre-line;
    }

    /* ===== JUMP BUTTON ===== */
    .action-bar {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .visit-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 48px;
      background: linear-gradient(135deg, var(--primary-red), #B83C2E);
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(155, 43, 37, 0.35);
      transition: var(--transition);
    }

    .visit-btn:hover {
      background: linear-gradient(135deg, var(--primary-gold), #E8C84A);
      box-shadow: 0 8px 28px rgba(212, 175, 55, 0.45);
      transform: translateY(-3px);
    }

    .visit-btn:active {
      transform: translateY(-1px);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero-banner { height: 300px; }
      .hero-title { font-size: 28px; }
      .hero-overlay { padding: 24px 20px; }
      .cards-grid { grid-template-columns: 1fr; }
      .content-card.full-width { grid-column: 1; }
      .navbar-title { font-size: 15px; }
    }

    @media (max-width: 480px) {
      .hero-banner { height: 240px; }
      .hero-title { font-size: 22px; }
      .container { padding: 20px 14px 60px; }
      .visit-btn { padding: 13px 32px; font-size: 15px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">
        <i class="fa fa-pagoda" style="font-size:16px;"></i>
      </div>
      <span class="navbar-title">雪域安多·藏韵传承</span>
    </a>
    <a href="index.html" class="navbar-back">
      <i class="fa fa-home"></i> 返回首页
    </a>
  </nav>

  <!-- ===== MAIN ===== -->
  <div class="container">

    <!-- Loading -->
    <div v-if="loading" class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载景点详情...</div>
    </div>

    <!-- Error -->
    <div v-else-if="error" class="error-container">
      <div class="error-icon"><i class="fa fa-exclamation-circle"></i></div>
      <div class="error-message">{{ errorMessage }}</div>
      <a href="index.html" class="back-btn">
        <i class="fa fa-home"></i> 返回首页
      </a>
    </div>

    <!-- Content -->
    <div v-else>

      <!-- Hero Banner -->
      <div class="hero-banner">
        <img :src="spot.cover" :alt="spot.name" @error="onImgError">
        <div class="hero-overlay">
          <h1 class="hero-title">{{ spot.name }}</h1>
          <span class="hero-address">
            <i class="fa fa-map-marker"></i>{{ spot.address }}
          </span>
        </div>
      </div>

      <!-- Content Cards -->
      <div :class="['cards-grid', spot.sections.length === 1 ? 'single-col' : '']">
        <div
          v-for="(sec, idx) in spot.sections"
          :key="idx"
          :class="['content-card', spot.sections.length % 2 !== 0 && idx === spot.sections.length - 1 ? 'full-width' : '']"
        >
          <div class="card-header">
            <div class="card-icon">
              <i :class="'fa ' + sec.icon"></i>
            </div>
            <h2 class="card-title">{{ sec.title }}</h2>
          </div>
          <div class="card-body">{{ sec.content }}</div>
        </div>
      </div>

      <!-- Jump Button -->
      <div class="action-bar" v-if="spot.link">
        <a :href="spot.link" class="visit-btn">
          <i class="fa fa-external-link"></i>
          访问完整页面
        </a>
      </div>

    </div>
  </div>
</div>

createApp({
  data() {
    return {
      loading: true,
      error: false,
      errorMessage: '',
      spot: null
    };
  },

  mounted() {
    this.loadSpot();
  },

  methods: {
    loadSpot() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        this.errorMessage = '未指定景点 ID，请从首页重新进入。';
        this.error = true;
        this.loading = false;
        return;
      }

      const spot = SPOT_DATABASE[String(id)];

      if (!spot) {
        this.errorMessage = `未找到 ID 为 ${id} 的景点数据。`;
        this.error = true;
        this.loading = false;
        return;
      }

      // 如果有 link，直接跳转
      if (spot.link) {
        window.location.href = spot.link;
        // 保留当前页作为备用：若跳转失败则继续渲染
        // 设置短暂超时后停止 loading，显示详情
        setTimeout(() => {
          this.spot = spot;
          document.title = spot.name + ' - 雪域安多·藏韵传承';
          this.loading = false;
        }, 800);
        return;
      }

      this.spot = spot;
      document.title = spot.name + ' - 雪域安多·藏韵传承';
      this.loading = false;
    },

    onImgError(e) {
      e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460"><rect width="100%25" height="100%25" fill="%23f0ece6"/><text x="50%25" y="50%25" font-size="18" fill="%239B2B25" text-anchor="middle" dominant-baseline="middle">图片加载中...</text></svg>';
    }
  }
}).mount('#app');
</script>
