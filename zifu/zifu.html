<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>藏文30个字母学习工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f7f2e9;
            padding: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fffaf0;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #6d3a15;
            margin-bottom: 30px;
            font-size: 28px;
        }
        /* 字母网格 */
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .letter-card {
            background: #fff;
            border: 2px solid #d9b48f;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .letter-card:hover {
            background: #ffe4b5;
            border-color: #b97a46;
            transform: translateY(-3px);
        }
        .tibetan-char {
            font-size: 48px;
            color: #992620;
            margin-bottom: 8px;
        }
        .phonetic {
            font-size: 16px;
            color: #666;
        }
        /* 结果展示区 */
        .result-area {
            background: #fff;
            border: 2px solid #b97a46;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
        }
        .result-title {
            font-size: 22px;
            color: #6d3a15;
            margin-bottom: 20px;
        }
        .syllable-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .syllable-item {
            font-size: 56px;
            color: #992620;
            padding: 15px;
            background: #f7f2e9;
            border-radius: 8px;
            min-width: 100px;
        }
        .empty-tip {
            font-size: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>藏文30个字母学习工具</h1>

        <!-- 30个字母网格 -->
        <div class="letter-grid" id="letterGrid"></div>

        <!-- 结果展示区 -->
        <div class="result-area">
            <div class="result-title">点击上方字母，查看带元音的组合</div>
            <div class="syllable-grid" id="resultGrid">
                <div class="empty-tip">请选择一个字母</div>
            </div>
        </div>
    </div>

    <script>
        // 藏文30个基础字母 + 国际音标（和你提供的字母表完全一致）
        const tibetanLetters = [
            { char: 'ཀ', phonetic: 'ka [ka]' },
            { char: 'ཁ', phonetic: 'kha [kʰa]' },
            { char: 'ག', phonetic: 'ga [ga]' },
            { char: 'ང', phonetic: 'nga [ŋa]' },
            { char: 'ཅ', phonetic: 'ca [tɕa]' },
            { char: 'ཆ', phonetic: 'cha [tɕʰa]' },
            { char: 'ཇ', phonetic: 'ja [dʑa]' },
            { char: 'ཉ', phonetic: 'nya [ɲa]' },
            { char: 'ཏ', phonetic: 'ta [ta]' },
            { char: 'ཐ', phonetic: 'tha [tʰa]' }, // 对应图中第二个字母
            { char: 'ད', phonetic: 'da [da]' },
            { char: 'ན', phonetic: 'na [na]' },
            { char: 'པ', phonetic: 'pa [pa]' },
            { char: 'ཕ', phonetic: 'pha [pʰa]' },
            { char: 'བ', phonetic: 'ba [ba]' },
            { char: 'མ', phonetic: 'ma [ma]' },
            { char: 'ཙ', phonetic: 'tsa [tsa]' },
            { char: 'ཚ', phonetic: 'tsha [tsʰa]' },
            { char: 'ཛ', phonetic: 'dza [dza]' },
            { char: 'ཝ', phonetic: 'wa [wa]' },
            { char: 'ཞ', phonetic: 'zha [ʒa]' },
            { char: 'ཟ', phonetic: 'za [za]' },
            { char: 'འ', phonetic: "'a [a]" },
            { char: 'ཡ', phonetic: 'ya [ja]' },
            { char: 'ར', phonetic: 'ra [ra]' },
            { char: 'ལ', phonetic: 'la [la]' },
            { char: 'ཤ', phonetic: 'sha [ʃa]' },
            { char: 'ས', phonetic: 'sa [sa]' },
            { char: 'ཧ', phonetic: 'ha [ha]' },
            { char: 'ཨ', phonetic: 'a [a]' }
        ];

        // 4个元音符号
        const vowels = ['ི', 'ུ', 'ེ', 'ོ'];

        const letterGrid = document.getElementById('letterGrid');
        const resultGrid = document.getElementById('resultGrid');

        // 渲染30个字母
        function renderLetters() {
            letterGrid.innerHTML = '';
            tibetanLetters.forEach(letter => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.innerHTML = `
                    <div class="tibetan-char">${letter.char}</div>
                    <div class="phonetic">${letter.phonetic}</div>
                `;
                // 点击事件：生成带元音的组合
                card.addEventListener('click', () => {
                    renderSyllables(letter.char);
                });
                letterGrid.appendChild(card);
            });
        }

        // 渲染「字母+4个元音」的组合
        function renderSyllables(baseChar) {
            resultGrid.innerHTML = '';
            vowels.forEach(vowel => {
                const item = document.createElement('div');
                item.className = 'syllable-item';
                item.textContent = baseChar + vowel;
                resultGrid.appendChild(item);
            });
        }

        // 初始化页面
        renderLetters();
    </script>
</body>
</html>
